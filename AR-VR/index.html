<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI Virtual Shoe Try-On</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.module.js"
  }
}
</script>

</head>

<body>

<h1>AI Virtual Shoe Try-On</h1>

<div class="controls">

<button id="start">Start Camera</button>

<select id="shoeSelector">
<option value="shoe.glb">Nike Style</option>
<option value="shoe2.glb">Adidas Style</option>
<option value="shoe3.glb">Running Shoe</option>
</select>

<button id="capture">Screenshot</button>

</div>

<video id="video" autoplay playsinline></video>

<canvas id="threeCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script type="module" src="app.js"></script>

</body>
</html>
